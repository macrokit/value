# value.macrokit.dev — STATIC hosting for the value project + Agent Value-Meter.
#
# The page is client-only: it runs the real value_meter.py in-browser via
# Pyodide, so there is no app server to proxy to — nginx just serves public/.
# Same pattern as the studio.macrokit.dev vhost. TLS via certbot
# (run once: sudo certbot --nginx -d value.macrokit.dev).

server {
    listen 80;
    listen [::]:80;
    server_name value.macrokit.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name value.macrokit.dev;

    ssl_certificate     /etc/letsencrypt/live/value.macrokit.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/value.macrokit.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /macrokit/value-site/public;
    index index.html;

    # The Python source (py/*.py) and example records are copied/regenerated on
    # every deploy and are NOT content-hashed, so they must revalidate each load
    # (cheap ETag 304s) — otherwise a deploy is masked by a stale browser cache.
    location ~* \.(js|py|json|css|map)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location ~* \.(svg|ico|png|jpg|jpeg|webp|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        try_files $uri =404;
    }
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
