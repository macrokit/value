<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="vgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a5b4fc"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="616" width="1200" height="14" fill="#4F46E5"/>

  <!-- logo tile -->
  <g transform="translate(96,150)">
    <rect x="0" y="0" width="150" height="150" rx="35" fill="url(#tile)"/>
    <g transform="scale(2.34)">
      <path d="M 14 41 A 18 18 0 0 1 50 41" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" opacity="0.92"/>
      <line x1="32" y1="42" x2="45.5" y2="32.5" stroke="#ffffff" stroke-width="3.6" stroke-linecap="round"/>
      <circle cx="32" cy="42" r="4.4" fill="#1E1B4B"/>
      <circle cx="32" cy="42" r="2.0" fill="#ffffff"/>
    </g>
  </g>

  <!-- title block -->
  <text x="290" y="205" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="62" font-weight="800" fill="#ffffff">A Mathematical</text>
  <text x="290" y="278" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="62" font-weight="800" fill="#ffffff">Theory of <tspan fill="#818cf8">Value</tspan></text>
  <text x="293" y="330" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="27" fill="#c7cbef">Built the way Shannon built information.</text>

  <!-- equations row -->
  <g font-family="'SF Mono',Menlo,Consolas,monospace" font-size="30" fill="#dfe1fb">
    <rect x="96"  y="430" width="320" height="74" rx="14" fill="#262357" stroke="#393680"/>
    <text x="256" y="476" text-anchor="middle">V = Σ kᵢ ln eᵢ</text>
    <rect x="440" y="430" width="320" height="74" rx="14" fill="#262357" stroke="#393680"/>
    <text x="600" y="476" text-anchor="middle">ΔG ≤ I(X;Y)</text>
    <rect x="784" y="430" width="320" height="74" rx="14" fill="#262357" stroke="#393680"/>
    <text x="944" y="476" text-anchor="middle">G = D(q‖r)−D(q‖p)</text>
  </g>

  <text x="96" y="560" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="24" fill="#a9adde">value.macrokit.dev   ·   byline Cheng Qian</text>
